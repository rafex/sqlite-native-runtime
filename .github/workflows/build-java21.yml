# ─────────────────────────────────────────────────────────────────────────────
# build-java21.yml — Pipeline secundario: Java 21 Preview JAR + JNI Native Image
#
# Dispara en:
#   workflow_call  : invocado por release.yml (pasa release_tag como input)
#   workflow_dispatch : ejecucion manual, release_tag opcional
#
# Tres lineas de artefactos:
#
#   A) Java 21 FFM preview (ether-sqlite-java21-runtime)
#      JAR ONLY. Bytecode 65.65535 (minor=0xFFFF), requiere JVM 21 + enable-preview.
#      NO es viable como native-image (ForeignFunctionsRuntime no existe en GraalVM 21,
#      y GraalVM 25 rechaza bytecode preview de otra version principal).
#
#   B) JNI Java 22 stable FFM (ether-sqlite-jni-java21-runtime)
#      Bytecode class file 66 (Java 22 stable, sin enable-preview).
#      GraalVM 25 puede compilarlo a native-image sin restricciones.
#      Este modulo usa Panama FFM estable (JEP 454) compilado con Java 22.
#
# Jobs:
#   build-rust          [amd64, arm64] → rust-lib-{arch}  (solo en workflow_dispatch)
#   build-java21-jar    [ubuntu-latest] → java-jar-java21
#   build-jni-jar       [ubuntu-latest] → java-jni-jar
#   build-native-jni    [amd64, arm64] → native-img-jni-{arch}
#
# Grafo (workflow_dispatch standalone):
#   build-rust ──→ build-native-jni
#   build-java21-jar  (independiente)
#   build-jni-jar     (independiente)
#
# Grafo (workflow_call desde release.yml):
#   build-native-jni descarga rust-lib-{arch} ya subido por build-java25-native
#   build-java21-jar  (independiente)
#   build-jni-jar     (independiente)
# ─────────────────────────────────────────────────────────────────────────────

name: Build Java 21 + JNI Native Image

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag del release (ej. v0.1.0). Vacio = version actual del pom.xml'
        required: false
        type: string
        default: ''

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag del release (ej. v0.1.0). Vacio = version actual del pom.xml'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GLIBC_MIN: "2.17"

jobs:

  # ── 1. Rust .so — solo en workflow_dispatch (standalone) ─────────────────────
  # Cuando release.yml llama este workflow via workflow_call, build-java25-native
  # ya subio rust-lib-{arch} al mismo run_id, por lo que este job se salta y
  # build-native-jni descarga directamente esos artefactos.
  build-rust:
    name: "Rust .so (${{ matrix.arch }}) [standalone]"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_arch: x86_64
            lib: libether_sqlite_runtime-linux-amd64.so
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            zig_arch: aarch64
            lib: libether_sqlite_runtime-linux-arm64.so

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('sources/rust/ether-sqlite/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-cargo-

      - name: Install Zig (${{ matrix.zig_arch }})
        run: |
          ZIG_VERSION=0.13.0
          curl -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Add Rust target (${{ matrix.rust_target }})
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build .so (glibc ${{ env.GLIBC_MIN }}+)
        working-directory: sources/rust/ether-sqlite
        run: cargo zigbuild --release --target "${{ matrix.rust_target }}.${{ env.GLIBC_MIN }}"

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp sources/rust/ether-sqlite/target/${{ matrix.rust_target }}/release/libether_sqlite_runtime.so \
             dist/${{ matrix.lib }}

      - uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.arch }}
          path: dist/

  # ── 2a. JAR Java 21 preview — Panama FFM preview (JEP 442, enable-preview) ───
  build-java21-jar:
    name: "Java 21 JAR (thin + fat, --enable-preview)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java21-${{ hashFiles('sources/java/ether-sqlite-java21-runtime/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java21-

      - name: Set pom.xml version from tag
        if: inputs.release_tag != ''
        working-directory: sources/java/ether-sqlite-java21-runtime
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false \
            --no-transfer-progress -q

      - name: Build Java 21 thin JAR + fat JAR
        working-directory: sources/java/ether-sqlite-java21-runtime
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(./mvnw -f sources/java/ether-sqlite-java21-runtime/pom.xml \
            help:evaluate -Dexpression=project.version -q -DforceStdout)
          cp "sources/java/ether-sqlite-java21-runtime/target/ether-sqlite-java21-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-java21-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-java21-runtime/target/ether-sqlite-java21-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-java21-runtime-${VERSION}-fat.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: java-jar-java21
          path: dist/

  # ── 2b. JAR JNI Java 22 stable — Panama FFM estable (JEP 454, sin preview) ──
  build-jni-jar:
    name: "JNI Java 22 JAR (thin + fat)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-jni-${{ hashFiles('sources/java/ether-sqlite-jni-java21-runtime/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-jni-

      - name: Set pom.xml version from tag
        if: inputs.release_tag != ''
        working-directory: sources/java/ether-sqlite-jni-java21-runtime
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false \
            --no-transfer-progress -q

      - name: Build JNI Java 22 thin JAR + fat JAR
        working-directory: sources/java/ether-sqlite-jni-java21-runtime
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(./mvnw -f sources/java/ether-sqlite-jni-java21-runtime/pom.xml \
            help:evaluate -Dexpression=project.version -q -DforceStdout)
          cp "sources/java/ether-sqlite-jni-java21-runtime/target/ether-sqlite-jni-java21-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-jni-java21-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-jni-java21-runtime/target/ether-sqlite-jni-java21-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-jni-java21-runtime-${VERSION}-fat.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: java-jni-jar
          path: dist/

  # ── 3. GraalVM Native Image JNI Java 22 — matrix x86_64 / arm64 ─────────────
  build-native-jni:
    name: "Native Image JNI (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: [build-rust]
    # Corre si build-rust tuvo exito (workflow_dispatch) o fue saltado (workflow_call).
    # En workflow_call, descarga rust-lib-{arch} subido por build-java25-native en el mismo run.
    if: always() && (needs.build-rust.result == 'success' || needs.build-rust.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            lib: libether_sqlite_runtime-linux-amd64.so
            binary: ether-sqlite-jni-linux-amd64.bin
          - arch: arm64
            runner: ubuntu-24.04-arm
            lib: libether_sqlite_runtime-linux-arm64.so
            binary: ether-sqlite-jni-linux-arm64.bin

    steps:
      - uses: actions/checkout@v4

      - name: Download .so (${{ matrix.arch }})
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-${{ matrix.arch }}
          path: dist

      - name: Setup GraalVM JDK 25 (con native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ matrix.runner }}-maven-jni-${{ hashFiles('sources/java/ether-sqlite-jni-java21-runtime/pom.xml') }}
          restore-keys: ${{ matrix.runner }}-maven-jni-

      - name: Set pom.xml version from tag
        if: inputs.release_tag != ''
        working-directory: sources/java/ether-sqlite-jni-java21-runtime
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false \
            --no-transfer-progress -q

      - name: Build GraalVM Native Image (JNI Java 22)
        working-directory: sources/java/ether-sqlite-jni-java21-runtime
        env:
          ETHER_SQLITE_LIB: ${{ github.workspace }}/dist/${{ matrix.lib }}
        run: ./mvnw -Pnative package native:compile -DskipTests --no-transfer-progress

      - name: Collect artifact
        run: |
          mkdir -p out
          cp sources/java/ether-sqlite-jni-java21-runtime/target/ether-sqlite-jni out/${{ matrix.binary }}
          chmod +x out/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-img-jni-${{ matrix.arch }}
          path: out/
