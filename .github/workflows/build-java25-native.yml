# ─────────────────────────────────────────────────────────────────────────────
# build-java25-native.yml — Pipeline primario: Java 25 + GraalVM Native Image
#
# Dispara en:
#   workflow_call  : invocado por release.yml (pasa release_tag como input)
#   workflow_dispatch : ejecucion manual, release_tag opcional
#
# Jobs:
#   build-rust           [amd64, arm64] → rust-lib-{arch}
#   build-java25-jar     [ubuntu-latest] → java-jar-java25
#   build-native-java25  [amd64, arm64] → native-img-java25-{arch}
#
# Grafo:
#   build-rust ──→ build-native-java25
#   build-java25-jar (independiente)
# ─────────────────────────────────────────────────────────────────────────────

name: Build Java 25 + Native Image

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag del release (ej. v0.1.0). Vacio = version actual del pom.xml'
        required: false
        type: string
        default: ''

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag del release (ej. v0.1.0). Vacio = version actual del pom.xml'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GLIBC_MIN: "2.17"

jobs:

  # ── 1. Compilar libether_sqlite_runtime.so — matrix x86_64 / arm64 ──────────
  build-rust:
    name: "Rust .so (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_arch: x86_64
            lib: libether_sqlite_runtime-linux-amd64.so
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            zig_arch: aarch64
            lib: libether_sqlite_runtime-linux-arm64.so

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('sources/rust/ether-sqlite/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-cargo-

      - name: Install Zig (${{ matrix.zig_arch }})
        run: |
          ZIG_VERSION=0.13.0
          curl -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Add Rust target (${{ matrix.rust_target }})
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build .so (glibc ${{ env.GLIBC_MIN }}+)
        working-directory: sources/rust/ether-sqlite
        run: cargo zigbuild --release --target "${{ matrix.rust_target }}.${{ env.GLIBC_MIN }}"

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp sources/rust/ether-sqlite/target/${{ matrix.rust_target }}/release/libether_sqlite_runtime.so \
             dist/${{ matrix.lib }}

      - uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.arch }}
          path: dist/

  # ── 2. JARs Java 25 — Panama FFM estable (JEP 454, sin enable-preview) ───────
  build-java25-jar:
    name: "Java 25 JAR (thin + fat)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java25-${{ hashFiles('sources/java/ether-sqlite-runtime/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java25-

      - name: Set pom.xml version from tag
        if: inputs.release_tag != ''
        working-directory: sources/java/ether-sqlite-runtime
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false \
            --no-transfer-progress -q

      - name: Build Java 25 thin JAR + fat JAR
        working-directory: sources/java/ether-sqlite-runtime
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(./mvnw -f sources/java/ether-sqlite-runtime/pom.xml \
            help:evaluate -Dexpression=project.version -q -DforceStdout)
          cp "sources/java/ether-sqlite-runtime/target/ether-sqlite-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-runtime/target/ether-sqlite-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-runtime-${VERSION}-fat.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: java-jar-java25
          path: dist/

  # ── 3. GraalVM Native Image Java 25 — matrix x86_64 / arm64 ─────────────────
  build-native-java25:
    name: "Native Image Java 25 (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: build-rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            lib: libether_sqlite_runtime-linux-amd64.so
            binary: ether-sqlite-linux-amd64.bin
          - arch: arm64
            runner: ubuntu-24.04-arm
            lib: libether_sqlite_runtime-linux-arm64.so
            binary: ether-sqlite-linux-arm64.bin

    steps:
      - uses: actions/checkout@v4

      - name: Download .so (${{ matrix.arch }})
        uses: actions/download-artifact@v4
        with:
          name: rust-lib-${{ matrix.arch }}
          path: dist

      - name: Setup GraalVM JDK 25 (con native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ matrix.runner }}-maven-java25-${{ hashFiles('sources/java/ether-sqlite-runtime/pom.xml') }}
          restore-keys: ${{ matrix.runner }}-maven-java25-

      - name: Set pom.xml version from tag
        if: inputs.release_tag != ''
        working-directory: sources/java/ether-sqlite-runtime
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false \
            --no-transfer-progress -q

      - name: Build GraalVM Native Image (Java 25)
        working-directory: sources/java/ether-sqlite-runtime
        env:
          ETHER_SQLITE_LIB: ${{ github.workspace }}/dist/${{ matrix.lib }}
        run: ./mvnw -Pnative package native:compile -DskipTests --no-transfer-progress

      - name: Collect artifact
        run: |
          mkdir -p out
          cp sources/java/ether-sqlite-runtime/target/ether-sqlite out/${{ matrix.binary }}
          chmod +x out/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-img-java25-${{ matrix.arch }}
          path: out/
