# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Integración continua
#
# Dispara en:
#   • push a main  (validar que main siempre está verde)
#   • pull_request (validar antes de integrar)
#
# Jobs (paralelos):
#   test-rust  → Debian 12 (workspace Rust completo):
#                  TT-1: cargo test --lib        (137 unit tests en ether-sqlite-core)
#                  TT-2: cargo test --test       (FFI contract en ether-sqlite-core)
#                  TT-3: cargo build -p ether-sqlite-ffm  (cdylib FFM compila)
#                  TT-4: cargo build -p ether-sqlite-jni  (cdylib JNI compila)
#
#   test-java  → Multi-stage Docker (compila FFM+JNI Rust, luego 3 suites Java):
#                  java25-tester     (FFM estable Java 25, unit + integration)
#                  java21ffm-tester  (FFM preview Java 21, unit + integration)
#                  java21jni-tester  (JNI real Java 21,    unit + integration)
#
# Nota sobre caches:
#   Las dependencias Rust y Maven se descargan dentro de los contenedores Docker.
#   El host del runner no comparte su filesystem con docker build, por lo que
#   cachear ~/.cargo o ~/.m2 en el host no beneficia a las builds en contenedor.
#   El cache de capas Docker (layer cache) es gestionado por el runner de GitHub.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
    paths:
      # Código fuente Rust y Java
      - 'sources/**'
      # Dockerfiles de test
      - 'containers/**'
      # Scripts de build/test y archivos de configuración de Make/Just
      - 'scripts/**'
      - 'Makefile'
      - 'Justfile'
      # El propio workflow (cambios en CI deben validarse)
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'sources/**'
      - 'containers/**'
      - 'scripts/**'
      - 'Makefile'
      - 'Justfile'
      - '.github/workflows/ci.yml'

# Cancela runs anteriores del mismo PR/branch para no saturar los runners
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTAINER_ENGINE: docker

jobs:

  # ── Rust: unit tests + FFI contract + compilación cdylib FFM y JNI ──────────
  test-rust:
    name: "🦀 Rust (unit + FFI + build FFM/JNI)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and run Rust tests
        run: make container-test-rust

  # ── Java: unit + integration — FFM Java 25, FFM Java 21, JNI Java 21 ────────
  test-java:
    name: "☕ Java (unit + integration — FFM25 / FFM21 / JNI21)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image and run Java tests
        run: make container-test-java
