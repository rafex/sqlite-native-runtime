# ─────────────────────────────────────────────────────────────────────────────
# publish.yml — Flujo 2: Compilación y publicación en GitHub Packages
#
# Dispara en:
#   push de tag        : v{MAJOR}.{MINOR}.{PATCH}[-sufijo]
#                        Versiones y AUTO_RELEASE se leen de VERSIONS en el tag.
#
#   workflow_dispatch  : ejecución manual desde github.com
#                        Las versiones se pasan como inputs.
#                        Actualiza VERSIONS en main y dispara release.yml.
#
# Paquetes publicados en GHCR (ghcr.io/{owner}/):
#
#   ether-sqlite-ffm:{rust_v}-{arch}         → libether_sqlite_ffm_runtime.so
#   ether-sqlite-jni:{rust_v}-{arch}         → libether_sqlite_jni_runtime.so
#   ether-sqlite-ffm-runtime:{fat_v}         → thin + fat JAR (Java 25 stable FFM)
#   ether-sqlite-ffm-java21-runtime:{fat_v}  → thin + fat JAR (Java 21 preview FFM)
#   ether-sqlite-jni-runtime:{fat_v}         → thin + fat JAR (JNI Java 21)
#   ether-sqlite-ffm-native:{nat_v}-{arch}   → GraalVM binary (FFM Java 25)
#   ether-sqlite-jni-native:{nat_v}-{arch}   → GraalVM binary (JNI Java 21)
#
# Grafo de jobs:
#
#   update-versions ──→ build-rust-ffm ──→ build-native-ffm
#                   └──→ build-rust-jni ──→ build-native-jni
#                   └──→ build-java-fat
#                   └──→ build-java-fat-ffm21
#                   └──→ (todos) ──→ trigger-release
# ─────────────────────────────────────────────────────────────────────────────

name: Publish

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag del release (ej. v0.4.0) — debe existir en el repo'
        required: true
        type: string
      rust_version:
        description: 'RUST — versión .so FFM+JNI (ej. v0.4.0)'
        required: true
        type: string
      java_fat_version:
        description: 'JAVA_FAT — versión JARs thin+fat (ej. v0.4.0)'
        required: true
        type: string
      java_native_version:
        description: 'JAVA_NATIVE — versión binarios GraalVM native (ej. v0.4.0)'
        required: true
        type: string
      auto_release:
        description: 'Disparar release.yml al terminar'
        required: false
        type: boolean
        default: true

permissions:
  packages: write
  contents: write  # update-versions hace commit+push a main
  actions: write   # trigger-release dispara release.yml

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GLIBC_MIN: "2.17"
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Versión efectiva del release: tag push → github.ref_name, manual → input
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
  # Versiones efectivas de cada grupo de artefactos:
  # tag push → todos usan el mismo tag; manual → cada uno usa su input
  EFF_RUST: ${{ inputs.rust_version || inputs.release_tag || github.ref_name }}
  EFF_FAT:  ${{ inputs.java_fat_version || inputs.release_tag || github.ref_name }}
  EFF_NAT:  ${{ inputs.java_native_version || inputs.release_tag || github.ref_name }}

jobs:

  # ── Preparación: actualizar VERSIONS si es ejecución manual ──────────────────
  # Para tag push: solo imprime las versiones leídas de VERSIONS en el tag.
  # Para manual:   escribe las versiones provistas como inputs en VERSIONS de
  #                main y hace commit (con [skip ci] para no disparar ci.yml).
  update-versions:
    name: "📋 Preparar VERSIONS"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumen de versiones (tag push — lee de VERSIONS)
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "Disparo por tag: ${{ env.RELEASE_TAG }}"
          echo ""
          echo "VERSIONS en el tag:"
          cat VERSIONS

      - name: Actualizar VERSIONS en main (ejecución manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Preservar el bloque de comentarios al inicio del archivo.
          # Reemplazar (o añadir) las cuatro claves.
          python3 - <<'PYEOF'
          import re, pathlib

          f = pathlib.Path("VERSIONS")
          text = f.read_text()

          def set_key(txt, key, val):
              pattern = rf"^{key}=.*$"
              replacement = f"{key}={val}"
              if re.search(pattern, txt, re.MULTILINE):
                  return re.sub(pattern, replacement, txt, flags=re.MULTILINE)
              # Clave no existe → añadir al final
              return txt.rstrip("\n") + f"\n{replacement}\n"

          text = set_key(text, "RUST",         "${{ env.EFF_RUST }}")
          text = set_key(text, "JAVA_FAT",     "${{ env.EFF_FAT }}")
          text = set_key(text, "JAVA_NATIVE",  "${{ env.EFF_NAT }}")
          text = set_key(text, "AUTO_RELEASE", "${{ inputs.auto_release }}")

          f.write_text(text)
          print("VERSIONS actualizado:")
          print(text)
          PYEOF

      - name: Commit y push VERSIONS (ejecución manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSIONS
          # Si no hay cambios (ya estaba actualizado), el commit falla con exit 1 → ignorar
          git diff --cached --quiet && echo "VERSIONS sin cambios." || \
            git commit -m "chore: actualizar VERSIONS para ${{ env.RELEASE_TAG }} [skip ci]"
          git push origin main

  # ── Rust FFM .so (amd64 + arm64) ─────────────────────────────────────────────
  build-rust-ffm:
    name: "🦀 Rust FFM .so (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: [update-versions]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_arch: x86_64
            lib_src: libether_sqlite_ffm_runtime.so
            lib_dst: libether_sqlite_ffm_runtime-linux-amd64.so
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            zig_arch: aarch64
            lib_src: libether_sqlite_ffm_runtime.so
            lib_dst: libether_sqlite_ffm_runtime-linux-arm64.so

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.runner }}-cargo-ffm-${{ hashFiles('sources/rust/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-cargo-ffm-

      - name: Install Zig (${{ matrix.zig_arch }})
        run: |
          ZIG_VERSION=0.13.0
          curl -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build libether_sqlite_ffm_runtime.so (glibc ${{ env.GLIBC_MIN }}+)
        working-directory: sources/rust
        run: cargo zigbuild -p ether-sqlite-ffm --release --target "${{ matrix.rust_target }}.${{ env.GLIBC_MIN }}"

      - name: Collect .so
        run: |
          mkdir -p dist
          cp "sources/rust/target/${{ matrix.rust_target }}/release/${{ matrix.lib_src }}" \
             "dist/${{ matrix.lib_dst }}"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push FFM .so to GHCR
        working-directory: dist
        run: |
          VERSION="${{ env.EFF_RUST }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-ffm:${VERSION}-${{ matrix.arch }}"
          oras push "$IMAGE" "${{ matrix.lib_dst }}:application/octet-stream"
          echo "Publicado: ${IMAGE}"

      - name: Upload artifact (para build-native-ffm del mismo run)
        uses: actions/upload-artifact@v4
        with:
          name: pub-ffm-lib-${{ matrix.arch }}
          path: dist/${{ matrix.lib_dst }}
          retention-days: 1

  # ── Rust JNI .so (amd64 + arm64) ─────────────────────────────────────────────
  build-rust-jni:
    name: "🦀 Rust JNI .so (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: [update-versions]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            zig_arch: x86_64
            lib_src: libether_sqlite_jni_runtime.so
            lib_dst: libether_sqlite_jni_runtime-linux-amd64.so
          - arch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            zig_arch: aarch64
            lib_src: libether_sqlite_jni_runtime.so
            lib_dst: libether_sqlite_jni_runtime-linux-arm64.so

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.runner }}-cargo-jni-${{ hashFiles('sources/rust/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-cargo-jni-

      - name: Install Zig (${{ matrix.zig_arch }})
        run: |
          ZIG_VERSION=0.13.0
          curl -fsSL \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-linux-${{ matrix.zig_arch }}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Build libether_sqlite_jni_runtime.so (glibc ${{ env.GLIBC_MIN }}+)
        working-directory: sources/rust
        run: cargo zigbuild -p ether-sqlite-jni --release --target "${{ matrix.rust_target }}.${{ env.GLIBC_MIN }}"

      - name: Collect .so
        run: |
          mkdir -p dist
          cp "sources/rust/target/${{ matrix.rust_target }}/release/${{ matrix.lib_src }}" \
             "dist/${{ matrix.lib_dst }}"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push JNI .so to GHCR
        working-directory: dist
        run: |
          VERSION="${{ env.EFF_RUST }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-jni:${VERSION}-${{ matrix.arch }}"
          oras push "$IMAGE" "${{ matrix.lib_dst }}:application/octet-stream"
          echo "Publicado: ${IMAGE}"

      - name: Upload artifact (para build-native-jni del mismo run)
        uses: actions/upload-artifact@v4
        with:
          name: pub-jni-lib-${{ matrix.arch }}
          path: dist/${{ matrix.lib_dst }}
          retention-days: 1

  # ── Java Fat JARs — FFM Java 25 + JNI Java 21 ────────────────────────────────
  build-java-fat:
    name: "☕ Java Fat JARs (FFM25 + JNI)"
    runs-on: ubuntu-latest
    needs: [update-versions]
    env:
      MAVEN_REPO: ${{ github.workspace }}/.m2-local

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2-local
          key: ${{ runner.os }}-maven-fat-${{ hashFiles('sources/java/ether-sqlite-core/pom.xml', 'sources/java/ether-sqlite-ffm-runtime/pom.xml', 'sources/java/ether-sqlite-jni-runtime/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-fat-

      - name: Set release version en pom.xml (runtime modules solamente)
        run: |
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          # ether-sqlite-core NO se versiona: es dependencia interna no publicada.
          ./mvnw versions:set -f sources/java/ether-sqlite-ffm-runtime/pom.xml \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false --no-transfer-progress -q
          ./mvnw versions:set -f sources/java/ether-sqlite-jni-runtime/pom.xml \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false --no-transfer-progress -q

      - name: Build + install ether-sqlite-core
        run: ./mvnw install -f sources/java/ether-sqlite-core/pom.xml -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Build ether-sqlite-ffm-runtime (thin + fat)
        working-directory: sources/java/ether-sqlite-ffm-runtime
        run: ./mvnw package -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Build ether-sqlite-jni-runtime (thin + fat)
        working-directory: sources/java/ether-sqlite-jni-runtime
        run: ./mvnw package -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          cp "sources/java/ether-sqlite-ffm-runtime/target/ether-sqlite-ffm-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-ffm-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-ffm-runtime/target/ether-sqlite-ffm-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-ffm-runtime-${VERSION}-fat.jar"
          cp "sources/java/ether-sqlite-jni-runtime/target/ether-sqlite-jni-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-jni-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-jni-runtime/target/ether-sqlite-jni-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-jni-runtime-${VERSION}-fat.jar"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push ether-sqlite-ffm-runtime JARs a GHCR
        working-directory: dist
        run: |
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-ffm-runtime:${VERSION}"
          oras push "${IMAGE}" \
            "ether-sqlite-ffm-runtime-${VERSION}.jar:application/java-archive" \
            "ether-sqlite-ffm-runtime-${VERSION}-fat.jar:application/java-archive"
          echo "Publicado: ${IMAGE}"

      - name: Push ether-sqlite-jni-runtime JARs a GHCR
        working-directory: dist
        run: |
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-jni-runtime:${VERSION}"
          oras push "${IMAGE}" \
            "ether-sqlite-jni-runtime-${VERSION}.jar:application/java-archive" \
            "ether-sqlite-jni-runtime-${VERSION}-fat.jar:application/java-archive"
          echo "Publicado: ${IMAGE}"

      - uses: actions/upload-artifact@v4
        with:
          name: pub-java-fat-ffm25-jni
          path: dist/
          retention-days: 7

  # ── Java Fat JARs — FFM Java 21 preview ──────────────────────────────────────
  build-java-fat-ffm21:
    name: "☕ Java Fat JARs (FFM21 preview)"
    runs-on: ubuntu-latest
    needs: [update-versions]
    env:
      MAVEN_REPO: ${{ github.workspace }}/.m2-local

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2-local
          key: ${{ runner.os }}-maven-fat-ffm21-${{ hashFiles('sources/java/ether-sqlite-core/pom.xml', 'sources/java/ether-sqlite-ffm-java21-runtime/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-fat-ffm21-

      - name: Set release version en pom.xml
        run: |
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -f sources/java/ether-sqlite-ffm-java21-runtime/pom.xml \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false --no-transfer-progress -q

      - name: Build + install ether-sqlite-core
        run: ./mvnw install -f sources/java/ether-sqlite-core/pom.xml -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Build ether-sqlite-ffm-java21-runtime (thin + fat)
        working-directory: sources/java/ether-sqlite-ffm-java21-runtime
        run: ./mvnw package -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          cp "sources/java/ether-sqlite-ffm-java21-runtime/target/ether-sqlite-ffm-java21-runtime-${VERSION}.jar" \
             "dist/ether-sqlite-ffm-java21-runtime-${VERSION}.jar"
          cp "sources/java/ether-sqlite-ffm-java21-runtime/target/ether-sqlite-ffm-java21-runtime-${VERSION}-fat.jar" \
             "dist/ether-sqlite-ffm-java21-runtime-${VERSION}-fat.jar"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push ether-sqlite-ffm-java21-runtime JARs a GHCR
        working-directory: dist
        run: |
          VERSION="${{ env.EFF_FAT }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-ffm-java21-runtime:${VERSION}"
          oras push "${IMAGE}" \
            "ether-sqlite-ffm-java21-runtime-${VERSION}.jar:application/java-archive" \
            "ether-sqlite-ffm-java21-runtime-${VERSION}-fat.jar:application/java-archive"
          echo "Publicado: ${IMAGE}"

      - uses: actions/upload-artifact@v4
        with:
          name: pub-java-fat-ffm21
          path: dist/
          retention-days: 7

  # ── GraalVM Native Image FFM Java 25 (amd64 + arm64) ─────────────────────────
  build-native-ffm:
    name: "🖥️ Native Image FFM Java 25 (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: [build-rust-ffm]
    env:
      MAVEN_REPO: ${{ github.workspace }}/.m2-local
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            lib: libether_sqlite_ffm_runtime-linux-amd64.so
            binary: ether-sqlite-ffm-linux-amd64.bin
          - arch: arm64
            runner: ubuntu-24.04-arm
            lib: libether_sqlite_ffm_runtime-linux-arm64.so
            binary: ether-sqlite-ffm-linux-arm64.bin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download FFM .so (del mismo run)
        uses: actions/download-artifact@v4
        with:
          name: pub-ffm-lib-${{ matrix.arch }}
          path: dist

      - name: Setup GraalVM JDK 25 (con native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2-local
          key: ${{ matrix.runner }}-maven-native-ffm-${{ hashFiles('sources/java/ether-sqlite-core/pom.xml', 'sources/java/ether-sqlite-ffm-runtime/pom.xml') }}
          restore-keys: ${{ matrix.runner }}-maven-native-ffm-

      - name: Set release version en pom.xml
        run: |
          VERSION="${{ env.EFF_NAT }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -f sources/java/ether-sqlite-ffm-runtime/pom.xml \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false --no-transfer-progress -q

      - name: Build + install ether-sqlite-core
        run: ./mvnw install -f sources/java/ether-sqlite-core/pom.xml -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Build GraalVM Native Image (FFM Java 25)
        working-directory: sources/java/ether-sqlite-ffm-runtime
        env:
          ETHER_SQLITE_LIB: ${{ github.workspace }}/dist/${{ matrix.lib }}
        run: ./mvnw -Pnative package native:compile -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Collect artifact
        run: |
          mkdir -p out
          cp sources/java/ether-sqlite-ffm-runtime/target/ether-sqlite out/${{ matrix.binary }}
          chmod +x out/${{ matrix.binary }}

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push native binary FFM a GHCR
        working-directory: out
        run: |
          VERSION="${{ env.EFF_NAT }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-ffm-native:${VERSION}-${{ matrix.arch }}"
          oras push "${IMAGE}" "${{ matrix.binary }}:application/octet-stream"
          echo "Publicado: ${IMAGE}"

      - uses: actions/upload-artifact@v4
        with:
          name: pub-native-ffm-${{ matrix.arch }}
          path: out/
          retention-days: 7

  # ── GraalVM Native Image JNI Java 21 (amd64 + arm64) ─────────────────────────
  build-native-jni:
    name: "🖥️ Native Image JNI Java 21 (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: [build-rust-jni]
    env:
      MAVEN_REPO: ${{ github.workspace }}/.m2-local
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            lib: libether_sqlite_jni_runtime-linux-amd64.so
            binary: ether-sqlite-jni-linux-amd64.bin
          - arch: arm64
            runner: ubuntu-24.04-arm
            lib: libether_sqlite_jni_runtime-linux-arm64.so
            binary: ether-sqlite-jni-linux-arm64.bin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download JNI .so (del mismo run)
        uses: actions/download-artifact@v4
        with:
          name: pub-jni-lib-${{ matrix.arch }}
          path: dist

      - name: Setup GraalVM JDK 25 (con native-image)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.m2-local
          key: ${{ matrix.runner }}-maven-native-jni-${{ hashFiles('sources/java/ether-sqlite-core/pom.xml', 'sources/java/ether-sqlite-jni-runtime/pom.xml') }}
          restore-keys: ${{ matrix.runner }}-maven-native-jni-

      - name: Set release version en pom.xml
        run: |
          VERSION="${{ env.EFF_NAT }}"
          VERSION="${VERSION#v}"
          ./mvnw versions:set -f sources/java/ether-sqlite-jni-runtime/pom.xml \
            -DnewVersion="${VERSION}" -DgenerateBackupPoms=false --no-transfer-progress -q

      - name: Build + install ether-sqlite-core
        run: ./mvnw install -f sources/java/ether-sqlite-core/pom.xml -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Build GraalVM Native Image (JNI Java 21)
        working-directory: sources/java/ether-sqlite-jni-runtime
        env:
          ETHER_SQLITE_JNI_LIB: ${{ github.workspace }}/dist/${{ matrix.lib }}
        run: ./mvnw -Pnative package native:compile -Dmaven.repo.local="${MAVEN_REPO}" -DskipTests --no-transfer-progress

      - name: Collect artifact
        run: |
          mkdir -p out
          cp sources/java/ether-sqlite-jni-runtime/target/ether-sqlite-jni out/${{ matrix.binary }}
          chmod +x out/${{ matrix.binary }}

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push native binary JNI a GHCR
        working-directory: out
        run: |
          VERSION="${{ env.EFF_NAT }}"
          VERSION="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ether-sqlite-jni-native:${VERSION}-${{ matrix.arch }}"
          oras push "${IMAGE}" "${{ matrix.binary }}:application/octet-stream"
          echo "Publicado: ${IMAGE}"

      - uses: actions/upload-artifact@v4
        with:
          name: pub-native-jni-${{ matrix.arch }}
          path: out/
          retention-days: 7

  # ── Disparar release.yml cuando corresponda ───────────────────────────────────
  # Corre después de que TODOS los builds y publicaciones en GHCR terminaron.
  # Determina si AUTO_RELEASE está activo (input manual o VERSIONS del tag).
  # Pasa las versiones explícitamente a release.yml para evitar leer VERSIONS del tag.
  trigger-release:
    name: "🚀 Trigger release.yml"
    runs-on: ubuntu-latest
    needs:
      - build-rust-ffm
      - build-rust-jni
      - build-java-fat
      - build-java-fat-ffm21
      - build-native-ffm
      - build-native-jni

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Determinar AUTO_RELEASE
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            AUTO="${{ inputs.auto_release }}"
          else
            AUTO="$(grep '^AUTO_RELEASE=' VERSIONS | cut -d= -f2 | tr -d '[:space:]' || echo 'false')"
          fi
          echo "auto_release=${AUTO}" >> $GITHUB_OUTPUT
          echo "AUTO_RELEASE=${AUTO}"

      - name: Disparar release.yml
        if: steps.check.outputs.auto_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field "release_tag=${{ env.RELEASE_TAG }}" \
            --field "rust_version=${{ env.EFF_RUST }}" \
            --field "java_fat_version=${{ env.EFF_FAT }}" \
            --field "java_native_version=${{ env.EFF_NAT }}"
          echo "✅ release.yml disparado para ${{ env.RELEASE_TAG }}"
          echo "   https://github.com/${{ github.repository }}/actions/workflows/release.yml"

      - name: Saltar (AUTO_RELEASE deshabilitado)
        if: steps.check.outputs.auto_release != 'true'
        run: |
          echo "AUTO_RELEASE no está habilitado."
          echo "Para lanzar el release manualmente ejecuta:"
          echo "  just release ${{ env.RELEASE_TAG }}"
