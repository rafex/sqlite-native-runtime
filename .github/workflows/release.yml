# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Flujo 3: Construcción del release final
#
# Dispara en:
#   workflow_dispatch ÚNICAMENTE — lanzado por: just release <tag>
#   NUNCA de forma automática.
#
# Qué hace:
#   1. Lee el archivo VERSIONS del tag especificado:
#        RUST=v1.0.0        → librerías .so Rust en GHCR
#        JAVA_FAT=v1.0.0    → JARs thin + fat en GHCR
#        JAVA_NATIVE=v1.0.0 → binarios GraalVM native en GHCR
#
#   2. Descarga todos los artefactos desde GitHub Packages (GHCR) usando
#      las versiones declaradas en VERSIONS.
#
#   3. Calcula SHA256 de cada artefacto.
#
#   4. Crea el GitHub Release con todos los assets.
#
# Prerequisito: todos los paquetes referenciados en VERSIONS deben estar
# publicados previamente (Flujo 2 — just tag-push, o build-rust.yml manual).
#
# Paquetes descargados desde GHCR (ghcr.io/{owner}/):
#
#   [RUST]        ether-sqlite-ffm:{rust_v}-amd64   → libether_sqlite_ffm_runtime-linux-amd64.so
#   [RUST]        ether-sqlite-ffm:{rust_v}-arm64   → libether_sqlite_ffm_runtime-linux-arm64.so
#   [RUST]        ether-sqlite-jni:{rust_v}-amd64   → libether_sqlite_jni_runtime-linux-amd64.so
#   [RUST]        ether-sqlite-jni:{rust_v}-arm64   → libether_sqlite_jni_runtime-linux-arm64.so
#   [JAVA_FAT]    ether-sqlite-ffm-runtime:{fat_v}  → thin + fat JAR (Java 25 FFM)
#   [JAVA_FAT]    ether-sqlite-ffm-java21-runtime:{fat_v} → thin + fat JAR (Java 21 FFM preview)
#   [JAVA_FAT]    ether-sqlite-jni-runtime:{fat_v}  → thin + fat JAR (JNI Java 21)
#   [JAVA_NATIVE] ether-sqlite-ffm-native:{nat_v}-amd64 → ether-sqlite-ffm-linux-amd64.bin
#   [JAVA_NATIVE] ether-sqlite-ffm-native:{nat_v}-arm64 → ether-sqlite-ffm-linux-arm64.bin
#   [JAVA_NATIVE] ether-sqlite-jni-native:{nat_v}-amd64 → ether-sqlite-jni-linux-amd64.bin
#   [JAVA_NATIVE] ether-sqlite-jni-native:{nat_v}-arm64 → ether-sqlite-jni-linux-arm64.bin
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag del release final (ej. v1.0.0)'
        required: true
        type: string
      rust_version:
        description: 'RUST — versión .so en GHCR (ej. v1.0.0). Vacío = leer de VERSIONS'
        required: false
        type: string
        default: ''
      java_fat_version:
        description: 'JAVA_FAT — versión JARs en GHCR (ej. v1.0.0). Vacío = leer de VERSIONS'
        required: false
        type: string
        default: ''
      java_native_version:
        description: 'JAVA_NATIVE — versión binarios native en GHCR (ej. v1.0.0). Vacío = leer de VERSIONS'
        required: false
        type: string
        default: ''

# contents: write — crear el GitHub Release y subir assets
# packages: read  — descargar artefactos desde GHCR
permissions:
  contents: write
  packages: read

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  release:
    name: "GitHub Release ${{ inputs.release_tag }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Determinar versiones (inputs o VERSIONS del tag)
        id: versions
        run: |
          # Si se pasan inputs explícitos (invocado por publish.yml o manualmente),
          # se usan directamente. Si están vacíos, se leen de VERSIONS en el tag.
          RUST="${{ inputs.rust_version }}"
          JAVA_FAT="${{ inputs.java_fat_version }}"
          JAVA_NATIVE="${{ inputs.java_native_version }}"

          if [[ -z "$RUST" || -z "$JAVA_FAT" || -z "$JAVA_NATIVE" ]]; then
            VERSIONS_FILE="${GITHUB_WORKSPACE}/VERSIONS"
            if [[ ! -f "$VERSIONS_FILE" ]]; then
              echo "ERROR: versiones no pasadas como inputs y VERSIONS no encontrado en el tag." >&2
              exit 1
            fi
            RUST="${RUST:-$(grep '^RUST=' "$VERSIONS_FILE" | cut -d= -f2 | tr -d '[:space:]')}"
            JAVA_FAT="${JAVA_FAT:-$(grep '^JAVA_FAT=' "$VERSIONS_FILE" | cut -d= -f2 | tr -d '[:space:]')}"
            JAVA_NATIVE="${JAVA_NATIVE:-$(grep '^JAVA_NATIVE=' "$VERSIONS_FILE" | cut -d= -f2 | tr -d '[:space:]')}"
            echo "Fuente: VERSIONS del tag ${{ inputs.release_tag }}"
          else
            echo "Fuente: inputs del workflow"
          fi

          if [[ -z "$RUST" || -z "$JAVA_FAT" || -z "$JAVA_NATIVE" ]]; then
            echo "ERROR: versiones incompletas — se requieren RUST, JAVA_FAT y JAVA_NATIVE" >&2
            exit 1
          fi

          # Versiones sin prefijo 'v' para los tags de GHCR
          RUST_V="${RUST#v}"
          FAT_V="${JAVA_FAT#v}"
          NAT_V="${JAVA_NATIVE#v}"

          echo "rust_v=${RUST_V}"      >> $GITHUB_OUTPUT
          echo "fat_v=${FAT_V}"        >> $GITHUB_OUTPUT
          echo "nat_v=${NAT_V}"        >> $GITHUB_OUTPUT

          echo ""
          echo "Versiones para el release ${{ inputs.release_tag }}:"
          echo "  RUST        = ${RUST}  (GHCR: ${RUST_V})"
          echo "  JAVA_FAT    = ${JAVA_FAT}  (GHCR: ${FAT_V})"
          echo "  JAVA_NATIVE = ${JAVA_NATIVE}  (GHCR: ${NAT_V})"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Descargar Rust .so desde GHCR
        run: |
          mkdir -p artifacts
          cd artifacts
          RUST_V="${{ steps.versions.outputs.rust_v }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          echo "→ FFM amd64: ether-sqlite-ffm:${RUST_V}-amd64"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm:${RUST_V}-amd64"

          echo "→ FFM arm64: ether-sqlite-ffm:${RUST_V}-arm64"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm:${RUST_V}-arm64"

          echo "→ JNI amd64: ether-sqlite-jni:${RUST_V}-amd64"
          oras pull "${REG}/${OWNER}/ether-sqlite-jni:${RUST_V}-amd64"

          echo "→ JNI arm64: ether-sqlite-jni:${RUST_V}-arm64"
          oras pull "${REG}/${OWNER}/ether-sqlite-jni:${RUST_V}-arm64"

      - name: Descargar Java fat JARs desde GHCR
        run: |
          cd artifacts
          FAT_V="${{ steps.versions.outputs.fat_v }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          echo "→ FFM runtime (Java 25): ether-sqlite-ffm-runtime:${FAT_V}"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm-runtime:${FAT_V}"

          echo "→ FFM java21 runtime: ether-sqlite-ffm-java21-runtime:${FAT_V}"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm-java21-runtime:${FAT_V}"

          echo "→ JNI runtime (Java 21): ether-sqlite-jni-runtime:${FAT_V}"
          oras pull "${REG}/${OWNER}/ether-sqlite-jni-runtime:${FAT_V}"

      - name: Descargar GraalVM native images desde GHCR
        run: |
          cd artifacts
          NAT_V="${{ steps.versions.outputs.nat_v }}"
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"

          echo "→ FFM native amd64: ether-sqlite-ffm-native:${NAT_V}-amd64"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm-native:${NAT_V}-amd64"

          echo "→ FFM native arm64: ether-sqlite-ffm-native:${NAT_V}-arm64"
          oras pull "${REG}/${OWNER}/ether-sqlite-ffm-native:${NAT_V}-arm64"

          echo "→ JNI native amd64: ether-sqlite-jni-native:${NAT_V}-amd64"
          oras pull "${REG}/${OWNER}/ether-sqlite-jni-native:${NAT_V}-amd64"

          echo "→ JNI native arm64: ether-sqlite-jni-native:${NAT_V}-arm64"
          oras pull "${REG}/${OWNER}/ether-sqlite-jni-native:${NAT_V}-arm64"

      - name: Listar artefactos descargados
        run: ls -lh artifacts/

      - name: Calcular SHA256 checksums
        working-directory: artifacts
        run: |
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
            echo "  $(cat "${f}.sha256")"
          done

      - name: Crear GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$(mktemp --suffix=.md)"
          tail -n +2 RELEASE.md > "${NOTES_FILE}"
          gh release create "${{ inputs.release_tag }}" \
            --title "Release ${{ inputs.release_tag }}" \
            --notes-file "${NOTES_FILE}" \
            artifacts/* \
            scripts/release/install.sh
