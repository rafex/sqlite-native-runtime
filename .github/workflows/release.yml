# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Orquestador de publicacion
#
# Dispara en:
#   push de tag : v{MAJOR}.{MINOR}.{PATCH}[-sufijo]  (ej. v0.1.0, v2.0.0-rc.1)
#   workflow_dispatch : permite relanzar manualmente cualquier tag fallido
#
# Los paquetes Rust (.so) se publican de forma INDEPENDIENTE via build-rust.yml
# (tags rust-ffm-v* / rust-jni-v* o workflow_dispatch).
# Las versiones activas se leen de los archivos FFM_VERSION y JNI_VERSION en la raiz.
#
# Pipelines Java invocados en paralelo tras determinar versiones:
#   build-java-ffm.yml  →  Java 25 JAR + fat JAR + Native Image (FFM)
#                          Java 21 preview JAR + fat JAR (FFM, solo JAR)
#   build-java-jni.yml  →  Java 21 JAR + fat JAR + Native Image (JNI)
#
# Artefactos publicados en el GitHub Release:
#
#   Rust native FFM (.so):
#     libether_sqlite_ffm_runtime-linux-amd64.so  + .sha256
#     libether_sqlite_ffm_runtime-linux-arm64.so  + .sha256
#
#   Rust native JNI (.so):
#     libether_sqlite_jni_runtime-linux-amd64.so  + .sha256
#     libether_sqlite_jni_runtime-linux-arm64.so  + .sha256
#
#   Java 25 stable FFM (ether-sqlite-ffm-runtime):
#     ether-sqlite-ffm-runtime-{version}.jar          + .sha256
#     ether-sqlite-ffm-runtime-{version}-fat.jar      + .sha256
#
#   Java 21 preview FFM (ether-sqlite-ffm-java21-runtime, JAR only):
#     ether-sqlite-ffm-java21-runtime-{version}.jar     + .sha256
#     ether-sqlite-ffm-java21-runtime-{version}-fat.jar + .sha256
#
#   JNI Java 21 (ether-sqlite-jni-runtime):
#     ether-sqlite-jni-runtime-{version}.jar     + .sha256
#     ether-sqlite-jni-runtime-{version}-fat.jar + .sha256
#
#   GraalVM Native Image FFM Java 25:
#     ether-sqlite-ffm-linux-amd64.bin  + .sha256
#     ether-sqlite-ffm-linux-arm64.bin  + .sha256
#
#   GraalVM Native Image JNI Java 21:
#     ether-sqlite-jni-linux-amd64.bin  + .sha256
#     ether-sqlite-jni-linux-arm64.bin  + .sha256
#
#   Script:
#     install.sh
#
# Grafo de dependencias:
#
#   prepare ──→ build-java-ffm ──┐
#           └──→ build-java-jni ─┴──→ release
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ej. v0.1.0)'
        required: true
        type: string
      ffm_version:
        description: 'Version FFM Rust a usar (ej. 0.1.0). Vacio = leer de FFM_VERSION en el tag'
        required: false
        type: string
        default: ''
      jni_version:
        description: 'Version JNI Rust a usar (ej. 0.1.0). Vacio = leer de JNI_VERSION en el tag'
        required: false
        type: string
        default: ''

# contents: write — crear GitHub Releases y subir assets
# actions:  write — disparar verify-release.yml al terminar
# packages: read  — descargar .so de GHCR
permissions:
  contents: write
  actions: write
  packages: read

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  REGISTRY: ghcr.io
  FFM_IMAGE: ${{ github.repository_owner }}/ether-sqlite-ffm
  JNI_IMAGE: ${{ github.repository_owner }}/ether-sqlite-jni

jobs:

  # ── 0. Determinar versiones ───────────────────────────────────────────────────
  prepare:
    name: "Preparar versiones"
    runs-on: ubuntu-latest
    outputs:
      ffm_version: ${{ steps.versions.outputs.ffm_version }}
      jni_version: ${{ steps.versions.outputs.jni_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Determinar ffm_version y jni_version
        id: versions
        run: |
          FFM_V="${{ inputs.ffm_version }}"
          JNI_V="${{ inputs.jni_version }}"
          if [ -z "$FFM_V" ]; then
            FFM_V="$(cat FFM_VERSION)"
          fi
          if [ -z "$JNI_V" ]; then
            JNI_V="$(cat JNI_VERSION)"
          fi
          echo "ffm_version=${FFM_V}" >> $GITHUB_OUTPUT
          echo "jni_version=${JNI_V}" >> $GITHUB_OUTPUT
          echo "FFM version: ${FFM_V}"
          echo "JNI version: ${JNI_V}"
          echo "Release tag: ${{ env.RELEASE_TAG }}"

  # ── 1. Pipeline FFM: Java 25 JARs + Native Images + Java 21 preview JAR ──────
  build-java-ffm:
    name: "Pipeline Java FFM"
    needs: prepare
    uses: ./.github/workflows/build-java-ffm.yml
    with:
      release_tag: ${{ inputs.tag || github.ref_name }}
      ffm_version: ${{ needs.prepare.outputs.ffm_version }}
    secrets: inherit

  # ── 2. Pipeline JNI: Java 21 JAR + Native Images ─────────────────────────────
  build-java-jni:
    name: "Pipeline Java JNI"
    needs: prepare
    uses: ./.github/workflows/build-java-jni.yml
    with:
      release_tag: ${{ inputs.tag || github.ref_name }}
      jni_version: ${{ needs.prepare.outputs.jni_version }}
    secrets: inherit

  # ── 3. Calcular SHA256 y crear el GitHub Release ──────────────────────────────
  release:
    name: "GitHub Release ${{ inputs.tag || github.ref_name }}"
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-java-ffm
      - build-java-jni

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all build artifacts (JARs + native images)
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download FFM .so from GHCR (amd64)
        run: |
          cd artifacts
          oras pull "${{ env.REGISTRY }}/${{ env.FFM_IMAGE }}:${{ needs.prepare.outputs.ffm_version }}-amd64"

      - name: Download FFM .so from GHCR (arm64)
        run: |
          cd artifacts
          oras pull "${{ env.REGISTRY }}/${{ env.FFM_IMAGE }}:${{ needs.prepare.outputs.ffm_version }}-arm64"

      - name: Download JNI .so from GHCR (amd64)
        run: |
          cd artifacts
          oras pull "${{ env.REGISTRY }}/${{ env.JNI_IMAGE }}:${{ needs.prepare.outputs.jni_version }}-amd64"

      - name: Download JNI .so from GHCR (arm64)
        run: |
          cd artifacts
          oras pull "${{ env.REGISTRY }}/${{ env.JNI_IMAGE }}:${{ needs.prepare.outputs.jni_version }}-arm64"

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Compute SHA256 checksums
        working-directory: artifacts
        run: |
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
            echo "  checksum: $(cat "${f}.sha256")"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$(mktemp --suffix=.md)"
          tail -n +2 RELEASE.md > "${NOTES_FILE}"
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "Release ${{ env.RELEASE_TAG }}" \
            --notes-file "${NOTES_FILE}" \
            artifacts/* \
            scripts/release/install.sh

      - name: Trigger verify-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run verify-release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field release_tag="${{ env.RELEASE_TAG }}"
