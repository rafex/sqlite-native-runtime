# ─────────────────────────────────────────────────────────────────────────────
# release.yml — Orquestador de publicacion
#
# Dispara en:
#   push de tag : v{MAJOR}.{MINOR}.{PATCH}[-sufijo]  (ej. v0.1.0, v2.0.0-rc.1)
#   workflow_dispatch : permite relanzar manualmente cualquier tag fallido
#
# Delega la compilacion a los dos pipelines reutilizables:
#   build-java25-native.yml  →  Rust .so + Java 25 JARs + Native Images x86_64/arm64
#   build-java21.yml         →  Java 21 preview JAR + JNI Java 22 JAR + JNI Native Images
#
# Artefactos publicados en el GitHub Release (29 ficheros):
#
#   Rust native (.so):
#     libether_sqlite_runtime-linux-amd64.so
#     libether_sqlite_runtime-linux-amd64.so.sha256
#     libether_sqlite_runtime-linux-arm64.so
#     libether_sqlite_runtime-linux-arm64.so.sha256
#
#   Java 25 stable FFM (ether-sqlite-runtime):
#     ether-sqlite-runtime-{version}.jar
#     ether-sqlite-runtime-{version}.jar.sha256
#     ether-sqlite-runtime-{version}-fat.jar
#     ether-sqlite-runtime-{version}-fat.jar.sha256
#
#   Java 21 preview FFM (ether-sqlite-java21-runtime, JAR only):
#     ether-sqlite-java21-runtime-{version}.jar
#     ether-sqlite-java21-runtime-{version}.jar.sha256
#     ether-sqlite-java21-runtime-{version}-fat.jar
#     ether-sqlite-java21-runtime-{version}-fat.jar.sha256
#
#   JNI Java 22 stable FFM (ether-sqlite-jni-java21-runtime):
#     ether-sqlite-jni-java21-runtime-{version}.jar
#     ether-sqlite-jni-java21-runtime-{version}.jar.sha256
#     ether-sqlite-jni-java21-runtime-{version}-fat.jar
#     ether-sqlite-jni-java21-runtime-{version}-fat.jar.sha256
#
#   GraalVM Native Image Java 25:
#     ether-sqlite-linux-amd64.bin
#     ether-sqlite-linux-amd64.bin.sha256
#     ether-sqlite-linux-arm64.bin
#     ether-sqlite-linux-arm64.bin.sha256
#
#   GraalVM Native Image JNI Java 22:
#     ether-sqlite-jni-linux-amd64.bin
#     ether-sqlite-jni-linux-amd64.bin.sha256
#     ether-sqlite-jni-linux-arm64.bin
#     ether-sqlite-jni-linux-arm64.bin.sha256
#
#   Script:
#     install.sh
#
# Grafo de dependencias:
#
#   build-java25-native ──→ build-java21 ──┐
#                       └─────────────────┴──→ release
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ej. v0.1.0)'
        required: true
        type: string

# contents: write — crear GitHub Releases y subir assets
# actions:  write — disparar verify-release.yml al terminar
permissions:
  contents: write
  actions: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:

  # ── 1. Pipeline primario: Java 25 + Rust .so + Native Images ─────────────────
  build-java25-native:
    name: "Pipeline Java 25 + Native"
    uses: ./.github/workflows/build-java25-native.yml
    with:
      release_tag: ${{ inputs.tag || github.ref_name }}
    secrets: inherit

  # ── 2. Pipeline secundario: Java 21 preview JAR + JNI Native Images ──────────
  # Espera a build-java25-native para reutilizar sus artefactos rust-lib-{arch}.
  # build-java21/build-rust esta desactivado en workflow_call (if: workflow_dispatch),
  # asi que build-native-jni descarga directamente los .so del pipeline anterior.
  build-java21:
    name: "Pipeline Java 21 + JNI"
    needs: build-java25-native
    uses: ./.github/workflows/build-java21.yml
    with:
      release_tag: ${{ inputs.tag || github.ref_name }}
    secrets: inherit

  # ── 3. Calcular SHA256 y crear el GitHub Release ──────────────────────────────
  release:
    name: "GitHub Release ${{ inputs.tag || github.ref_name }}"
    runs-on: ubuntu-latest
    needs:
      - build-java25-native
      - build-java21

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Compute SHA256 checksums
        working-directory: artifacts
        run: |
          for f in *; do
            sha256sum "$f" > "${f}.sha256"
            echo "  checksum: $(cat "${f}.sha256")"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="$(mktemp --suffix=.md)"
          tail -n +2 RELEASE.md > "${NOTES_FILE}"
          gh release create "${RELEASE_TAG}" \
            --title "Release ${RELEASE_TAG}" \
            --notes-file "${NOTES_FILE}" \
            artifacts/* \
            scripts/release/install.sh

      - name: Trigger verify-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run verify-release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            --field release_tag="${RELEASE_TAG}"
