# ─────────────────────────────────────────────────────────────────────────────
# verify-release.yml — Verifica los artefactos del GitHub Release
#
# Disparadores:
#   • Automático : el job "release" de release.yml llama a
#                  `gh workflow run verify-release.yml --field release_tag=vX.Y.Z`
#                  justo después de subir todos los assets. Es el ÚNICO disparo
#                  automático; nunca se lanza por commits a main.
#   • Manual     : Actions → Verify Release → Run workflow
#                  Sin inputs → valida el último release publicado (latest).
#                  Con release_tag → valida esa versión concreta.
#
# Qué valida (para cada arquitectura):
#   1. install.sh del release   — el script de instalación publicado funciona
#   2. thin JAR + JVM           — API Java completa sobre la .so instalada
#   3. fat JAR + JVM            — mismo test, JAR standalone sin dependencias
#   4. ether-sqlite prebuilt       — binario nativo pre-compilado del release
#   5. Native Image (build)     — compilación de Main.java con native-image 25
#
# Grafo de ejecución:
#   release.yml → gh workflow run → verify [amd64 / arm64]
# ─────────────────────────────────────────────────────────────────────────────

name: Verify Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag del release a verificar (vacío = último release publicado)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:

  verify:
    name: "🔍 Verify ${{ inputs.release_tag || 'latest' }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: "Mostrar configuración"
        run: |
          echo "Release a verificar : ${{ inputs.release_tag || 'latest' }}"
          echo "Arquitectura        : ${{ matrix.arch }}"
          echo "Runner              : ${{ matrix.runner }}"
          echo "Docker version      : $(docker --version)"

      - name: "Build y test de artefactos del release"
        run: |
          docker build \
            --build-arg ETHER_SQLITE_VERSION="${{ inputs.release_tag || 'latest' }}" \
            --progress=plain \
            --target test-release \
            containers/test-release/

      - name: "✅ Release verificado"
        run: |
          echo "Los artefactos del release ${{ inputs.release_tag || 'latest' }}"
          echo "han sido verificados correctamente en ${{ matrix.arch }}."
